# Cloudflare Pages project config. Optional for the dashboard build (the same values
# can be set in the Pages UI), but codifying them keeps `wrangler pages dev`/`deploy`
# and the dashboard in sync.
#
# The /api/* functions only use Web-standard globals (fetch, setTimeout, URL, JSON),
# so no nodejs_compat flag is required.

name = "election-tracker-2026"
pages_build_output_dir = "dist"
compatibility_date = "2026-06-22"
