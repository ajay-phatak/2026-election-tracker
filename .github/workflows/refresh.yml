# Scheduled warmer for the Workers KV data layer (see docs/kv-warmer-plan.md).
# Cloudflare Pages has no native cron, so a GitHub Actions schedule curls the
# token-gated /api/refresh endpoint to keep KV warm independently of user traffic.
#
# Two schedules feed one endpoint:
#   - every 15 min  -> ?only=markets  (control/odds/polls/history, mirrored from the
#                      clean-IP origin; ~23 reliable fetches, well under the 50-
#                      subrequest cap)
#   - every 3 hours -> ?only=news     (fetched directly from GNews with Cloudflare's
#                      NEWS_API_KEY; kept slow so 9 states x 8/day stays under GNews'
#                      ~100 req/day free quota)
# Manual runs (workflow_dispatch) default to ?only=all (markets + news).
#
# Setup (one-time): add a repo secret REFRESH_TOKEN equal to the Pages
# REFRESH_TOKEN env var (Settings -> Secrets and variables -> Actions -> New
# repository secret). Optionally set a repo variable PAGES_URL to override the
# default base URL (e.g. to target a preview deployment).

name: Refresh KV cache

on:
  schedule:
    # Markets: every 15 min. GitHub cron is best-effort and can run several minutes
    # late under load — fine for slow-moving odds (KV's read path live-falls-back).
    - cron: "*/15 * * * *"
    # News: every 3 hours, offset to :07 so it never lands on a markets tick.
    - cron: "7 */3 * * *"
  workflow_dispatch:
    inputs:
      only:
        description: "Which group to warm (all|markets|core|races|histories|news)"
        required: false
        default: "all"

permissions:
  contents: read

# Never let two warms overlap; the newest scheduled/manual run wins.
concurrency:
  group: kv-warmer
  cancel-in-progress: true

jobs:
  warm:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BASE_URL: ${{ vars.PAGES_URL || 'https://2026-election-tracker.pages.dev' }}
      REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
      # Manual run -> the chosen input; news schedule -> news; markets schedule (or
      # anything else) -> markets.
      ONLY: ${{ inputs.only || (github.event.schedule == '7 */3 * * *' && 'news' || 'markets') }}
    steps:
      - name: Warm KV (${{ env.ONLY }})
        run: |
          set -uo pipefail
          if [ -z "${REFRESH_TOKEN:-}" ]; then
            echo "::error::REFRESH_TOKEN secret is not set in this repo"
            exit 1
          fi
          # --fail-with-body: print the JSON summary, but exit non-zero on HTTP
          # >=400 (401 bad token / 503 misconfig / 5xx). A 207 partial refresh is
          # < 400, so it succeeds here but its failures[] is still printed.
          curl -sS --fail-with-body --max-time 180 \
            -H "X-Refresh-Token: $REFRESH_TOKEN" \
            "$BASE_URL/api/refresh?only=$ONLY"
          echo
